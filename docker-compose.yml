services:
  file-fix-permissions:
    image: alpine:latest
    container_name: pb_file-fix-permissions
    user: 0:0
    command: /bin/sh /permission.sh
    volumes:
      - ./docker:/permission/docker
      - .:/app
      - ./docker/permission.sh:/permission.sh
    environment:
      UID: ${UID}
      GID: ${GID}

  kafka:
    image: apache/kafka:latest
    user: ${DOCKER_UID}:${DOCKER_GID}
    container_name: pb_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: ${DOCKER_KAFKA_KRAFT_CLUSTER_ID}
      TZ: UTC
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
    restart: always
    volumes:
      - ./docker/kafka/data:/var/lib/kafka/data:rw
    depends_on:
      file-fix-permissions:
        condition: service_completed_successfully
    networks:
      pb_backend:
        aliases:
          - kafka

  php-fpm:
    build: docker/php-fpm
    user: ${DOCKER_UID}:${DOCKER_GID}
    container_name: pb_php-fpm
    expose:
      - 9000
    working_dir: /app
    volumes:
      - ./:/app
      - ./docker/php-fpm/logs:/opt/bitnami/php/logs:rw
      - ./docker/php-fpm/tmp:/opt/bitnami/php/tmp:rw
    restart: always
    depends_on:
      file-fix-permissions:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
    healthcheck:
      test: [ "CMD", "php" ,"-r", "print is_file('/opt/bitnami/php/tmp/php-fpm.pid');" ]
      timeout: 5s
      retries: 10
    networks:
      pb_backend:
        aliases:
          - php-fpm

  mysql:
    image: mysql:9.5.0
    user: ${DOCKER_UID}:${DOCKER_GID}
    container_name: pb_mysql
    expose:
      - ${APP_DATABASE_CONNECTIONS_DEFAULT_PORT}
    ports:
      - ${DOCKER_DB_EX_PORT}:${APP_DATABASE_CONNECTIONS_DEFAULT_PORT}
    volumes:
      - ./docker/mysql/data:/var/lib/mysql:rw
    environment:
      - MYSQL_ROOT_PASSWORD=${APP_DATABASE_CONNECTIONS_DEFAULT_PASSWORD}
      - MYSQL_DATABASE=${APP_DATABASE_CONNECTIONS_DEFAULT_DATABASE}
      - MYSQL_PORT_NUMBER=${APP_DATABASE_CONNECTIONS_DEFAULT_PORT}
    restart: always
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 10s
      retries: 10
    depends_on:
      file-fix-permissions:
        condition: service_completed_successfully
    networks:
      pb_backend:
        aliases:
          - mysql

  nginx:
    image: nginx:1.29
    user: ${DOCKER_UID}:${DOCKER_GID}
    container_name: pb_nginx
    ports:
      - ${DOCKER_WEB_ADDRESS}:${DOCKER_WEB_PORT}:8080
    volumes:
      - ./public:/app:ro
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/logs:/var/log/nginx:rw
    restart: always
    depends_on:
      file-fix-permissions:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      php-fpm:
        condition: service_healthy
    networks:
      pb_backend:
        aliases:
          - nginx

networks:
  pb_backend:
    driver: bridge